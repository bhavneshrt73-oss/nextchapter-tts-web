<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NextChapter TTS</title>
</head>
<body style="background:black; color:white; text-align:center; padding:20px;">

  <h1>📚 NextChapter Library</h1>

  <textarea id="text" placeholder="Paste text here..." style="width:90%; height:150px;"></textarea>

  <br><br>

  <button onclick="play()">▶ Play</button>
  <button onclick="stop()">⏹ Stop</button>

  <script>
    let speech = new SpeechSynthesisUtterance();

    function play() {
      speech.text = document.getElementById("text").value;
      speechSynthesis.speak(speech);
    }

    function stop() {
      speechSynthesis.cancel();
    }
  </script>

</body>
</html>
